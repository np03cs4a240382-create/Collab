<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Rental | Join Us</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="signup-container">
        <div class="form-card">
            <div class="logo">🚙 Vehicle Rental</div>
            <h2>Create Your Account</h2>
            <p class="subtitle">Enter your details to get started.</p>

            <form id="signupForm">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <span id="matchMessage" class="validation-text"></span>
                </div>

                <button type="submit" id="submitBtn">Create Account</button>
            </form>

            <p class="footer-text">Already have an account? <a href="#">Log In</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
